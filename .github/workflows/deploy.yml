name: Deploy docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install mkdocs-material

      - run: mkdocs gh-deploy --force
```

---

## 3. Move content into `docs/`

MkDocs expects all Markdown in a `docs/` folder:
```
TTS-Project-Framework/
├── docs/
│   ├── index.md                 ← move your root index.md here
│   └── insights/
│       ├── index.md
│       └── bias-and-cost.md
├── mkdocs.yml
└── .github/workflows/deploy.yml
```

**Your Markdown files need no front matter changes** — MkDocs uses `mkdocs.yml` for nav, not file metadata. Just move them.

---

## 4. GitHub Pages setting

After the first push, go to:

`Settings → Pages → Source → Deploy from branch → gh-pages → / (root)`

The Actions workflow creates the `gh-pages` branch automatically on first deploy.

---

## 5. Delete Jekyll files

Once migrated, remove:
```
_config.yml
Gemfile
Gemfile.lock   (if exists)